name: Plugin Build

on:
  push:
    branches:
      - master
    tags:
      - '*'
  pull_request:
    branches:
      - master

jobs:
  windows:
    name: Windows Build
    runs-on: windows-2022
    permissions:
      contents: read
    env:
      build_config: RelWithDebInfo
      DepsBasePath: 'D:\obs-deps'
      DepsPath: 'D:\obs-deps'                  # Flat extraction root
      QtBaseDir: 'D:\Qt'
      QTDIR: 'D:\Qt'                           # Flat extraction root
      OBS_INSTALL_DIR: 'D:\obs-install'        # Pre-built portable OBS extraction
    steps:
      - name: Checkout Plugin
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Cache OBS Dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: ${{ env.DepsBasePath }}
          key: obs-deps-${{ runner.os }}-${{ hashFiles('ci/windows/download-obs-deps.cmd') }}  # Update if script changes

      - name: Download & Extract OBS Dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          mkdir "${{ env.DepsBasePath }}" -Force
          Invoke-WebRequest -Uri "https://github.com/obsproject/obs-deps/releases/download/2025-08-23/windows-deps-2025-08-23-x64.zip" -OutFile "deps.zip"
          Expand-Archive -Path "deps.zip" -DestinationPath "${{ env.DepsBasePath }}" -Force
          Remove-Item "deps.zip" -Force
          # Optional debug
          Get-ChildItem "${{ env.DepsBasePath }}" -Recurse | Select-Object FullName
        shell: pwsh

      - name: Cache Qt6
        id: cache-qt
        uses: actions/cache@v4
        with:
          path: ${{ env.QtBaseDir }}
          key: qt6-${{ runner.os }}-${{ env.build_config }}-${{ hashFiles('ci/windows/install-qt-win.cmd') }}

      - name: Download & Extract Qt6 (RelWithDebInfo)
        if: steps.cache-qt.outputs.cache-hit != 'true'
        run: |
          mkdir "${{ env.QtBaseDir }}" -Force
          Invoke-WebRequest -Uri "https://github.com/obsproject/obs-deps/releases/download/2025-08-23/windows-deps-qt6-2025-08-23-x64-RelWithDebInfo.zip" -OutFile "qt.zip"
          Expand-Archive -Path "qt.zip" -DestinationPath "${{ env.QtBaseDir }}" -Force
          Remove-Item "qt.zip" -Force
          # Optional debug
          Get-ChildItem "${{ env.QtBaseDir }}" -Recurse | Select-Object FullName
        shell: pwsh

      - name: Download & Extract Pre-built OBS Portable ZIP
        run: |
          mkdir "${{ env.OBS_INSTALL_DIR }}" -Force
          Invoke-WebRequest -Uri "https://cdn-fastly.obsproject.com/downloads/OBS-Studio-32.0.4-Windows-x64.zip" -OutFile "obs.zip"
          Expand-Archive -Path "obs.zip" -DestinationPath "${{ env.OBS_INSTALL_DIR }}" -Force
          Remove-Item "obs.zip" -Force
          # Debug: Verify structure (look for bin/64bit/obs64.exe, include/obs-module.h, lib/obs.lib etc.)
          dir "${{ env.OBS_INSTALL_DIR }}" /s /b
        shell: pwsh

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Configure Plugin
        run: |
          cmake -S . -B build ^
            -G "Visual Studio 17 2022" -A x64 ^
            -DCMAKE_BUILD_TYPE=${{ env.build_config }} ^
            -DCMAKE_PREFIX_PATH="${{ env.QTDIR }};${{ env.DepsPath }};${{ env.OBS_INSTALL_DIR }}" ^
            -DOBS_INCLUDE_DIR="${{ env.OBS_INSTALL_DIR }}\include" ^
            -DOBS_LIB="${{ env.OBS_INSTALL_DIR }}\lib\obs.lib" ^
            # If your plugin needs more explicit paths (common for legacy plugins):
            # -DOBS_FRONTEND_LIB="${{ env.OBS_INSTALL_DIR }}\lib\obs-frontend-api.lib" ^
            # Or if using find_package(libobs):
            #   Ensure your CMakeLists.txt has find_package(libobs REQUIRED) and add -DCMAKE_MODULE_PATH if needed
            # Add any other plugin-specific CMake variables here
        shell: cmd

      - name: Build Plugin
        run: msbuild /m /p:Configuration=${{ env.build_config }} .\build\main.sln
        shell: cmd

      - name: Package Plugin
        run: ./ci/windows/package-windows.cmd
        shell: cmd
        env:
          OBS_INSTALL_DIR: ${{ env.OBS_INSTALL_DIR }}
          # If your package script needs specific OBS paths (e.g. for copying binaries or rundir):
          # OBS_BIN_DIR: ${{ env.OBS_INSTALL_DIR }}\bin\64bit
          # OBS_DATA_DIR: ${{ env.OBS_INSTALL_DIR }}\data

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows_build
          path: ./package
