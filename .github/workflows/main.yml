name: Plugin Build

on:
  push:
    branches:
      - master
    tags:
      - '*'
  pull_request:
    branches:
      - master

jobs:
  windows:
    name: Windows Build
    runs-on: windows-2022
    permissions:
      contents: read
    env:
      build_config: RelWithDebInfo
      DepsBasePath: 'D:\obs-deps'
      DepsPath: 'D:\obs-deps\win64'
      QtBaseDir: 'D:\Qt'
      QTDIR: 'D:\Qt\win64'
      OBSPath: 'D:\obs-studio'
    steps:
      - name: Checkout Plugin
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Cache OBS Dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.DepsBasePath }}
          key: obs-deps-${{ runner.os }}-${{ hashFiles('ci/windows/download-obs-deps.cmd') }}  # Update hash if script changes

      - name: Download OBS Dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          mkdir ${{ env.DepsBasePath }}
          Invoke-WebRequest -Uri "https://github.com/obsproject/obs-deps/releases/download/2025-08-23/windows-deps-2025-08-23-x64.zip" -OutFile "deps.zip"
          Expand-Archive -Path "deps.zip" -DestinationPath ${{ env.DepsBasePath }}
          Move-Item -Path "${{ env.DepsBasePath }}\windows-deps-2025-08-23-x64" -Destination ${{ env.DepsPath }}
        shell: pwsh

      - name: Cache Qt
        uses: actions/cache@v4
        with:
          path: ${{ env.QtBaseDir }}
          key: qt-deps-${{ runner.os }}-${{ env.build_config }}-${{ hashFiles('ci/windows/install-qt-win.cmd') }}  # Update if Qt install changes

      - name: Download Qt
        if: steps.cache-qt.outputs.cache-hit != 'true'
        run: |
          mkdir ${{ env.QtBaseDir }}
          Invoke-WebRequest -Uri "https://github.com/obsproject/obs-deps/releases/download/2025-08-23/windows-deps-qt6-2025-08-23-x64-${{ env.build_config }}.zip" -OutFile "qt.zip"
          Expand-Archive -Path "qt.zip" -DestinationPath ${{ env.QtBaseDir }}
          Move-Item -Path "${{ env.QtBaseDir }}\windows-deps-qt6-2025-08-23-x64" -Destination ${{ env.QTDIR }}
        shell: pwsh

      - name: Cache OBS Studio Build
        uses: actions/cache@v4
        with:
          path: ${{ env.OBSPath }}
          key: obs-build-${{ runner.os }}-${{ env.build_config }}-${{ hashFiles('**/CMakeLists.txt') }}  # Hash OBS sources

      - name: Checkout OBS Studio
        if: steps.cache-obs.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: obsproject/obs-studio
          path: obs-studio
          submodules: recursive

      - name: Configure OBS Studio
        if: steps.cache-obs.outputs.cache-hit != 'true'
        working-directory: ${{ env.OBSPath }}
        run: cmake --preset windows-x64 -DDepsPath="${{ env.DepsPath }}" -DQTDIR="${{ env.QTDIR }}" -DENABLE_BROWSER=OFF -DENABLE_VLC=OFF  # Add other flags as needed for your plugin
        shell: cmd

      - name: Build OBS Studio
        if: steps.cache-obs.outputs.cache-hit != 'true'
        working-directory: ${{ env.OBSPath }}
        run: cmake --build --preset windows-x64 --config ${{ env.build_config }}
        shell: cmd

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Configure Plugin
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 ^
            -DCMAKE_BUILD_TYPE=${{ env.build_config }} ^
            -DOBS_SRC_DIR=${{ env.OBSPath }} ^
            -DCMAKE_PREFIX_PATH="${{ env.QTDIR }};${{ env.DepsPath }}" ^
            # Add other plugin-specific CMake args here, e.g., -DOBS_INSTALL_DIR=${{ env.OBSPath }}\build_x64\rundir\${{ env.build_config }}
        shell: cmd

      - name: Build Plugin
        run: msbuild /m /p:Configuration=${{ env.build_config }} .\build\main.sln
        shell: cmd

      - name: Package Plugin
        run: ./ci/windows/package-windows.cmd  # Update this script if needed to handle 64-bit only and new paths
        shell: cmd

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows_build
          path: ./package
