name: Plugin Build

on:
  push:
    branches:
      - master
    tags:
      - '*'
  pull_request:
    branches:
      - master

jobs:
  windows:
    name: Windows Build
    runs-on: windows-2022
    permissions:
      contents: read
    env:
      build_config: RelWithDebInfo
      DepsBasePath: 'D:\obsdependencies'
      DepsPath32: 'D:\obsdependencies\win32'
      DepsPath64: 'D:\obsdependencies\win64'
      QtBaseDir: 'D:\QtDep'
      QTDIR32: 'D:\QtDep\5.10.1\msvc2017'
      QTDIR64: 'D:\QtDep\5.10.1\msvc2017_64'
      OBSPath: 'D:\obs-studio'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Qt
        run: ./ci/windows/install-qt-win.cmd
        shell: cmd
        env:
          QtBaseDir: ${{ env.QtBaseDir }}

      - name: Cache OBS Studio dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.DepsBasePath }}
          key: obsdeps-${{ runner.os }}-${{ hashFiles('ci/windows/download-obs-deps.cmd') }}

      - name: Download OBS Studio dependencies
        run: ./ci/windows/download-obs-deps.cmd
        shell: cmd

      - name: Cache OBS Studio builds
        uses: actions/cache@v4
        with:
          path: ${{ env.OBSPath }}
          key: obs-${{ runner.os }}-${{ hashFiles('ci/windows/prepare-obs-windows.cmd') }}

      - name: Checkout & CMake OBS Studio
        run: ./ci/windows/prepare-obs-windows.cmd
        shell: cmd
        env:
          build_config: ${{ env.build_config }}
          DepsPath32: ${{ env.DepsPath32 }}
          DepsPath64: ${{ env.DepsPath64 }}
          QTDIR32: ${{ env.QTDIR32 }}
          QTDIR64: ${{ env.QTDIR64 }}
          OBSPath: ${{ env.OBSPath }}

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build OBS Studio 32-bit
        run: msbuild /m /p:Configuration=${{ env.build_config }} ${{ env.OBSPath }}\build32\obs-studio.sln
        shell: cmd

      - name: Build OBS Studio 64-bit
        run: msbuild /m /p:Configuration=${{ env.build_config }} ${{ env.OBSPath }}\build64\obs-studio.sln
        shell: cmd

      - name: CMake Plugin
        run: ./ci/windows/prepare-windows.cmd
        shell: cmd
        env:
          build_config: ${{ env.build_config }}
          QTDIR32: ${{ env.QTDIR32 }}
          QTDIR64: ${{ env.QTDIR64 }}
          OBSPath: ${{ env.OBSPath }}

      - name: Build Plugin 32-bit
        run: msbuild /m /p:Configuration=${{ env.build_config }} .\build32\main.sln
        shell: cmd

      - name: Build Plugin 64-bit
        run: msbuild /m /p:Configuration=${{ env.build_config }} .\build64\main.sln
        shell: cmd

      - name: Package Plugin
        run: ./ci/windows/package-windows.cmd
        shell: cmd

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows_build
          path: ./package
