name: Plugin Build

on:
  push:
    branches:
      - master
    tags:
      - '*'
  pull_request:
    branches:
      - master

jobs:
  windows:
    name: Windows Build
    runs-on: windows-2022
    permissions:
      contents: read
    env:
      build_config: RelWithDebInfo
      DepsBasePath: 'D:\obs-deps'
      DepsPath: 'D:\obs-deps'
      QtBaseDir: 'D:\Qt'
      QTDIR: 'D:\Qt'
      OBS_RELATIVE_PATH: 'obs-studio'  # Relative in workspace
    steps:
      - name: Checkout Plugin
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Cache OBS Dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: ${{ env.DepsBasePath }}
          key: obs-deps-${{ runner.os }}-${{ hashFiles('ci/windows/download-obs-deps.cmd') }}

      - name: Download & Extract OBS Dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          mkdir "${{ env.DepsBasePath }}" -Force
          Invoke-WebRequest -Uri "https://github.com/obsproject/obs-deps/releases/download/2025-08-23/windows-deps-2025-08-23-x64.zip" -OutFile "deps.zip"
          Expand-Archive -Path "deps.zip" -DestinationPath "${{ env.DepsBasePath }}" -Force
          Remove-Item "deps.zip" -Force
        shell: pwsh

      - name: Cache Qt6
        id: cache-qt
        uses: actions/cache@v4
        with:
          path: ${{ env.QtBaseDir }}
          key: qt6-${{ runner.os }}-${{ env.build_config }}-${{ hashFiles('ci/windows/install-qt-win.cmd') }}

      - name: Download & Extract Qt6 (RelWithDebInfo)
        if: steps.cache-qt.outputs.cache-hit != 'true'
        run: |
          mkdir "${{ env.QtBaseDir }}" -Force
          Invoke-WebRequest -Uri "https://github.com/obsproject/obs-deps/releases/download/2025-08-23/windows-deps-qt6-2025-08-23-x64-RelWithDebInfo.zip" -OutFile "qt.zip"
          Expand-Archive -Path "qt.zip" -DestinationPath "${{ env.QtBaseDir }}" -Force
          Remove-Item "qt.zip" -Force
        shell: pwsh

      - name: Cache OBS Studio Build
        id: cache-obs
        uses: actions/cache@v4
        with:
          path: ${{ env.OBS_RELATIVE_PATH }}
          key: obs-build-${{ runner.os }}-${{ env.build_config }}-${{ hashFiles(format('{0}/CMakeLists.txt', env.OBS_RELATIVE_PATH)) }}

      - name: Checkout OBS Studio
        if: steps.cache-obs.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: obsproject/obs-studio
          path: ${{ env.OBS_RELATIVE_PATH }}
          submodules: recursive
          fetch-depth: 0  # Full history for git describe / tags

      - name: Configure OBS Studio
        if: steps.cache-obs.outputs.cache-hit != 'true'
        working-directory: ${{ env.OBS_RELATIVE_PATH }}
        run: |
          cmake --preset windows-x64 ^
            -DDepsPath="${{ env.DepsPath }}" ^
            -DQTDIR="${{ env.QTDIR }}" ^
            -DENABLE_BROWSER=OFF ^
            -DENABLE_VLC=OFF ^
            -DOBS_VERSION_OVERRIDE="32.0.4-ci"  # Force valid semver to avoid tag/describe errors
        shell: cmd

      - name: Build OBS Studio
        if: steps.cache-obs.outputs.cache-hit != 'true'
        working-directory: ${{ env.OBS_RELATIVE_PATH }}
        run: cmake --build --preset windows-x64 --config ${{ env.build_config }}
        shell: cmd

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Configure Plugin
        run: |
          cmake -S . -B build ^
            -G "Visual Studio 17 2022" -A x64 ^
            -DCMAKE_BUILD_TYPE=${{ env.build_config }} ^
            -DCMAKE_PREFIX_PATH="${{ env.QTDIR }};${{ env.DepsPath }};${{ github.workspace }}\${{ env.OBS_RELATIVE_PATH }}\build\windows-x64\${{ env.build_config }}" ^
            # Let FindLibObs / your CMake find obs headers/libs in the built OBS dir
            # If needed, add explicit: -DOBS_INCLUDE_DIR="${{ github.workspace }}\${{ env.OBS_RELATIVE_PATH }}\libobs" -DOBS_LIB="${{ github.workspace }}\${{ env.OBS_RELATIVE_PATH }}\build\windows-x64\${{ env.build_config }}\libobs\RelWithDebInfo\obs.lib"
        shell: cmd

      - name: Build Plugin
        run: msbuild /m /p:Configuration=${{ env.build_config }} .\build\main.sln
        shell: cmd

      - name: Package Plugin
        run: ./ci/windows/package-windows.cmd
        shell: cmd
        env:
          OBS_BUILD_DIR: ${{ github.workspace }}\${{ env.OBS_RELATIVE_PATH }}\build\windows-x64\${{ env.build_config }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows_build
          path: ./package
