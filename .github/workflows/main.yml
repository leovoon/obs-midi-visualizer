name: Plugin Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  windows:
    name: Windows Build
    runs-on: windows-2022
    permissions:
      contents: read
    env:
      build_config: RelWithDebInfo
      OBS_PATH: '${{ github.workspace }}\obs-studio'
      QTDIR: '${{ github.workspace }}\obs-studio\.deps\obs-deps-qt6-2025-08-23-x64'
    steps:
      - name: Checkout Plugin
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Checkout OBS Studio
        uses: actions/checkout@v4
        with:
          repository: obsproject/obs-studio
          path: obs-studio
          submodules: recursive
          fetch-depth: 0

      - name: Cache OBS Studio (.deps and build_x64)
        id: cache-obs
        uses: actions/cache@v4
        with:
          path: |
            obs-studio/.deps
            obs-studio/build_x64
          key: obs-studio-${{ runner.os }}-x64-${{ hashFiles('obs-studio/CMakeLists.txt', 'obs-studio/CMakePresets.json') }}
          restore-keys: |
            obs-studio-${{ runner.os }}-x64-

      - name: Configure OBS Studio
        if: steps.cache-obs.outputs.cache-hit != 'true'
        working-directory: obs-studio
        run: |
          cmake --preset windows-x64 ^
            -DENABLE_BROWSER=OFF ^
            -DENABLE_VLC=OFF
        shell: cmd

      - name: Build OBS Studio
        if: steps.cache-obs.outputs.cache-hit != 'true'
        working-directory: obs-studio
        run: cmake --build --preset windows-x64
        shell: cmd

      - name: Configure Plugin
        run: |
          cmake -S . -B build ^
            -G "Visual Studio 17 2022" -A x64 ^
            -DCMAKE_SYSTEM_VERSION=10.0 ^
            -DQTDIR="%QTDIR%" ^
            -DLIBOBS_INCLUDE_DIR="%OBS_PATH%\libobs" ^
            -DLIBOBS_LIB="%OBS_PATH%\build_x64\libobs\%build_config%\obs.lib" ^
            -DW32_PTHREADS_LIB="%OBS_PATH%\build_x64\deps\w32-pthreads\%build_config%\w32-pthreads.lib" ^
            -DOBS_FRONTEND_LIB="%OBS_PATH%\build_x64\frontend\api\%build_config%\obs-frontend-api.lib" ^
            -DOBS_BUILD_DIR="%OBS_PATH%\build_x64"
        shell: cmd

      - name: Build Plugin
        run: cmake --build build --config %build_config%
        shell: cmd

      - name: Package Plugin
        run: .\ci\windows\package-windows.cmd
        shell: cmd

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows_build
          path: ./package
